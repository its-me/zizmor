name: 'zizmor'
description: 'Static analysis for GitHub Actions security issues, powered by zizmor.'
author: 'Sergey Kanafyev'
branding:
  icon: 'shield'
  color: 'yellow'

inputs:
  inputs:
    description: 'Whitespace-separated list of files or directories to audit.'
    required: false
    default: '.'
  online-audits:
    description: 'Enable online (network-backed) audits. Set to "false" to run fully offline.'
    required: false
    default: 'true'
  persona:
    description: 'Audit strictness level: regular, pedantic, or auditor.'
    required: false
    default: 'regular'
  min-severity:
    description: 'Minimum severity to report (unknown, informational, low, medium, high).'
    required: false
    default: ''
  min-confidence:
    description: 'Minimum confidence to report (unknown, low, medium, high).'
    required: false
    default: ''
  token:
    description: 'GitHub token used to authenticate online audits.'
    required: false
    default: ${{ github.token }}
  advanced-security:
    description: >
      Upload results to GitHub Advanced Security (code scanning). One of
      "true", "false", or "auto" (upload only if the repository is public).
    required: false
    default: 'auto'
  config:
    description: 'Inline zizmor configuration (YAML) to apply.'
    required: false
    default: ''

outputs:
  output-file:
    description: 'Path (relative to the workspace) of the generated SARIF results file.'
    value: ${{ steps.zizmor.outputs.output-file }}

runs:
  using: 'composite'
  steps:
    - id: zizmor
      uses: ./audit
      with:
        inputs: ${{ inputs.inputs }}
        online-audits: ${{ inputs.online-audits }}
        persona: ${{ inputs.persona }}
        min-severity: ${{ inputs.min-severity }}
        min-confidence: ${{ inputs.min-confidence }}
        token: ${{ inputs.token }}
        config: ${{ inputs.config }}

    - if: >-
        always() &&
        (
          inputs.advanced-security == 'true' ||
          (inputs.advanced-security == 'auto' && github.event.repository.visibility == 'public')
        )
      uses: github/codeql-action/upload-sarif@v4
      with:
        sarif_file: ${{ steps.zizmor.outputs.output-file }}
