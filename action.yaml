name: 'zizmor'
description: 'Static analysis for GitHub Actions security issues, powered by zizmor.'
author: 'Sergey Kanafyev'
branding:
  icon: 'shield'
  color: 'yellow'

inputs:
  inputs:
    description: 'Whitespace-separated list of files or directories to audit.'
    required: false
    default: '.'
  online-audits:
    description: 'Enable online (network-backed) audits. Set to "false" to run fully offline.'
    required: false
    default: 'true'
  persona:
    description: 'Audit strictness level: regular, pedantic, or auditor.'
    required: false
    default: 'regular'
  min-severity:
    description: 'Minimum severity to report (unknown, informational, low, medium, high).'
    required: false
    default: ''
  min-confidence:
    description: 'Minimum confidence to report (unknown, low, medium, high).'
    required: false
    default: ''
  token:
    description: 'GitHub token used to authenticate online audits.'
    required: false
    default: ${{ github.token }}
  config:
    description: 'Inline zizmor configuration (YAML) to apply.'
    required: false
    default: ''
  advanced-security:
    description: >
      Upload results to GitHub Advanced Security (code scanning). One of
      "true", "false", or "auto" (upload only if code scanning is enabled
      for the repository).
    required: false
    default: 'auto'

outputs:
  output-file:
    description: 'Path (relative to the workspace) of the generated SARIF results file.'
    value: ${{ steps.zizmor.outputs.output-file }}

runs:
  using: 'composite'
  steps:
    - id: advanced-security
      shell: sh
      env:
        INPUT_ADVANCED_SECURITY: ${{ inputs.advanced-security }}
        GH_TOKEN: ${{ inputs.token }}
      run: |
        case "$INPUT_ADVANCED_SECURITY" in
          true) ENABLED=true ;;
          false) ENABLED=false ;;
          *)
            RESPONSE=$(gh api --include "repos/${GITHUB_REPOSITORY}/code-scanning/alerts?per_page=1" 2>/dev/null || true)
            STATUS=$(printf '%s\n' "$RESPONSE" | head -n1 | awk '{print $2}')
            # 200: code scanning is enabled and has existing alerts/analyses.
            # 404: code scanning is enabled but no analysis has been uploaded yet
            #      (e.g. the very first run) -- GitHub returns "no analysis found"
            #      here, not "disabled".
            # 403 (or anything else): Advanced Security isn't enabled.
            case "$STATUS" in
              200|404) ENABLED=true ;;
              *) ENABLED=false ;;
            esac
            ;;
        esac
        echo "enabled=$ENABLED" >> "$GITHUB_OUTPUT"

    - id: zizmor
      shell: sh
      env:
        ACTION_PATH: ${{ github.action_path }}
        INPUT_INPUTS: ${{ inputs.inputs }}
        INPUT_ONLINE_AUDITS: ${{ inputs.online-audits }}
        INPUT_PERSONA: ${{ inputs.persona }}
        INPUT_MIN_SEVERITY: ${{ inputs.min-severity }}
        INPUT_MIN_CONFIDENCE: ${{ inputs.min-confidence }}
        INPUT_TOKEN: ${{ inputs.token }}
        INPUT_CONFIG: ${{ inputs.config }}
        INPUT_FORMAT: ${{ steps.advanced-security.outputs.enabled == 'true' && 'sarif' || 'github' }}
      run: |
        docker build -t zizmor-audit -f "$ACTION_PATH/Dockerfile" "$ACTION_PATH"
        set +e
        docker run --rm \
          -e INPUT_INPUTS -e INPUT_ONLINE_AUDITS -e INPUT_PERSONA -e INPUT_MIN_SEVERITY \
          -e INPUT_MIN_CONFIDENCE -e INPUT_TOKEN -e INPUT_CONFIG -e INPUT_FORMAT -e GITHUB_WORKSPACE \
          -v "$GITHUB_WORKSPACE:$GITHUB_WORKSPACE" -w "$GITHUB_WORKSPACE" zizmor-audit
        STATUS=$?
        set -e
        if [ "$INPUT_FORMAT" = "sarif" ]; then
          echo "output-file=zizmor.sarif" >> "$GITHUB_OUTPUT"
        fi
        exit "$STATUS"

    - if: always() && steps.advanced-security.outputs.enabled == 'true'
      uses: github/codeql-action/upload-sarif@v4
      with:
        sarif_file: ${{ steps.zizmor.outputs.output-file }}
